name: Release CT

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ce2fs
        run: pip install ce2fs

      - name: Build CT
        run: python scripts/build.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LongYinLiZhiZhuan.CT
          generate_release_notes: true
